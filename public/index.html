<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Radar">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Live police sightings, speed cameras and turn-by-turn navigation.">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Radar</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="map"></div>
<!-- Street label overlay — positioned via map.project() in screen space -->
<div id="street-labels-overlay"></div>

<!-- ── Compass widget (nav mode only) ──────────── -->
<div id="compass-widget" class="hidden" title="Tap to reset to north-up">
  <div id="compass-rose">
    <div id="compass-n">N</div>
    <div id="compass-needle"></div>
  </div>
</div>

<!-- ── Normal top bar ──────────────────────────── -->
<div id="topbar">
  <div id="logo"><svg viewBox="0 0 32 32" width="26" height="26" fill="#ff2d55" xmlns="http://www.w3.org/2000/svg" aria-label="Radar"><circle cx="8" cy="8" r="6.5"/><circle cx="24" cy="8" r="6.5"/><circle cx="16" cy="23" r="10"/></svg></div>
  <div id="filters">
    <button class="filter-btn active" data-layer="police" title="Police">🚔</button>
    <button class="filter-btn active" data-layer="speed"  title="Cameras">📷</button>
    <button class="filter-btn active" data-layer="red_light" title="Red light">🔴</button>
    <button class="filter-btn" id="heatmap-btn" title="Report heatmap">🔥</button>
  </div>
</div>

<!-- ── Route planner (from / to) ───────────────── -->
<div id="route-planner">
  <div class="handle-row" style="padding:8px 0 4px"><div class="handle-pill"></div></div>
  <div id="planner-top">
    <button id="planner-back" aria-label="Back">←</button>
    <div id="planner-fields">
      <div class="field-row" id="from-row">
        <div class="field-dot dot-from"></div>
        <input id="from-input" class="field-input" type="text"
               placeholder="My location" autocomplete="off" spellcheck="false">
        <button class="field-clear hidden" id="from-clear" aria-label="Clear">✕</button>
      </div>
      <div class="field-connector">
        <div class="connector-line"></div>
        <button id="swap-btn" title="Swap">⇅</button>
      </div>
      <div class="field-row" id="to-row">
        <div class="field-dot dot-to"></div>
        <input id="to-input" class="field-input" type="text"
               placeholder="Where to?" autocomplete="off" spellcheck="false">
        <button class="field-clear hidden" id="to-clear" aria-label="Clear">✕</button>
      </div>
      <!-- ── Avoidance pills ──────────────────── -->
      <div id="avoid-pills">
        <button class="avoid-pill" id="avoid-tolls">🚫 Tolls</button>
        <button class="avoid-pill" id="avoid-highways">🛣️ Motorways</button>
      </div>
    </div>
  </div>
  <div id="search-results"></div>
</div>

<!-- ── Route preview ───────────────────────────── -->
<div id="preview-bar" class="hidden">
  <!-- Drag handle -->
  <div id="sheet-handle"><div class="handle-pill"></div></div>

  <!-- Always-visible summary row — Waze-style -->
  <div id="preview-head">
    <div id="preview-meta">
      <div id="preview-top-row">
        <span id="preview-time">–</span>
        <span id="preview-dist">–</span>
      </div>
      <div id="preview-via"></div>
      <div id="preview-avoidance-note" class="hidden"></div>
    </div>
    <div id="preview-actions">
      <button id="cancel-route-btn">Cancel</button>
      <button id="start-nav-btn">Go now</button>
    </div>
  </div>
  <!-- hidden elements kept for JS compat -->
  <span id="preview-eta" style="display:none"></span>
  <span id="preview-sub" style="display:none"></span>

  <!-- Scrollable content — hidden in peek state -->
  <div id="sheet-content">
    <div id="route-chips" class="hidden"></div>
    <div id="speed-profile" class="hidden">
      <div id="speed-profile-bar"></div>
      <div id="speed-profile-cursor" class="hidden"></div>
    </div>
    <div id="directions-list"></div>
  </div>
</div>

<!-- ── Active navigation ────────────────────────── -->
<div id="nav-instruction" class="hidden">
  <div id="nav-main">
    <div id="nav-icon">↑</div>
    <div id="nav-text">
      <div id="nav-dist">–</div>
      <div id="nav-street">–</div>
    </div>
  </div>
  <div id="nav-next-wrap" class="hidden">
    <span id="nav-next-icon">→</span>
    <span id="nav-next-label">Then –</span>
  </div>
</div>

<!-- ── Camera / hazard alert bar ────────────────── -->
<div id="alert-bar" class="hidden">
  <span id="alert-icon">📷</span>
  <span id="alert-text">Speed camera ahead</span>
  <span id="alert-dist">–</span>
</div>

<!-- ── Nav footer ───────────────────────────────── -->
<div id="nav-footer" class="hidden">
  <div id="nav-eta-block">
    <div id="nav-eta">–</div>
    <div id="nav-remaining">–</div>
  </div>
  <div id="speed-block">
    <div id="speed-limit-sign" class="hidden"><span id="speed-limit-val">–</span></div>
    <div id="current-speed">– <small>km/h</small></div>
  </div>
  <button id="view-toggle" class="hidden" title="Switch to 2D view">2D</button>
  <button id="north-up-btn" class="hidden" title="Reset to north-up">⬆ N</button>
  <button id="end-nav-btn">✕ End</button>
</div>

<!-- ── Arrival overlay ──────────────────────────── -->
<div id="arrival-overlay" class="hidden">
  <div id="arrival-card">
    <div id="arrival-emoji">🏁</div>
    <div id="arrival-title">You've arrived!</div>
    <div id="arrival-dest">–</div>
    <button id="arrival-done">Done</button>
  </div>
</div>

<!-- ── Settings & Style panel ───────────────────── -->
<div id="style-panel" class="hidden">
  <div id="style-panel-bg"></div>
  <div id="style-sheet">
    <div id="style-header">
      <span>Settings</span>
      <button id="style-close">✕</button>
    </div>

    <div class="settings-section-label">Map style</div>
    <div id="style-grid">
      <button class="style-btn active" data-style="dark">
        <div class="style-thumb" style="background:#1a1a2e"></div>
        <span>Dark</span>
      </button>
      <button class="style-btn" data-style="light">
        <div class="style-thumb" style="background:#f5f3ee;border:1px solid #ccc"></div>
        <span>Light</span>
      </button>
      <button class="style-btn" data-style="voyager">
        <div class="style-thumb" style="background:#d4e4c8;border:1px solid #aaa"></div>
        <span>Street</span>
      </button>
      <button class="style-btn" data-style="satellite">
        <div class="style-thumb" style="background:#2d4a2d"></div>
        <span>Satellite</span>
      </button>
      <button class="style-btn" data-style="terrain">
        <div class="style-thumb" style="background:#c5d8a4;border:1px solid #aaa"></div>
        <span>Terrain</span>
      </button>
    </div>

    <div class="settings-section-label" style="margin-top:18px">Display mode</div>
    <div id="lighting-toggle">
      <button class="lighting-btn" data-lighting="auto">🌓 Auto</button>
      <button class="lighting-btn" data-lighting="day">☀️ Day</button>
      <button class="lighting-btn" data-lighting="night">🌙 Night</button>
    </div>

    <div class="settings-section-label" style="margin-top:18px">Alerts & navigation</div>
    <div id="settings-toggles">
      <label class="setting-row"><span>🔊 Voice guidance</span>     <input type="checkbox" id="s-voice"   checked></label>
      <label class="setting-row"><span>📷 Camera alerts</span>      <input type="checkbox" id="s-camera"  checked></label>
      <label class="setting-row"><span>🚔 Police alerts</span>      <input type="checkbox" id="s-police"  checked></label>
      <label class="setting-row"><span>📳 Haptic feedback</span>    <input type="checkbox" id="s-haptic"  checked></label>
      <label class="setting-row"><span>🚫 Avoid tolls by default</span><input type="checkbox" id="s-tolls" checked></label>
    </div>

    <div class="settings-section-label" style="margin-top:18px">Units</div>
    <div id="unit-toggle">
      <button class="unit-btn active" data-unit="kmh">km/h</button>
      <button class="unit-btn" data-unit="mph">mph</button>
    </div>

    <button id="install-btn" class="hidden">⬇ Add to home screen</button>
  </div>
</div>

<!-- ── Idle bottom bar (Waze-style) ──────────── -->
<div id="idle-bar">
  <div class="handle-row"><div class="handle-pill"></div></div>
  <div id="idle-row">
    <button id="idle-search-btn">
      <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
      <span>Where to?</span>
    </button>
    <button id="idle-settings-btn" title="Settings">
      <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="10" r="3"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.22 3.22l1.42 1.42M15.36 15.36l1.42 1.42M3.22 16.78l1.42-1.42M15.36 4.64l1.42-1.42"/></svg>
    </button>
  </div>
</div>

<!-- ── Report FAB ──────────────────────────────── -->
<button id="report-btn" title="Report sighting">
  <svg viewBox="0 0 20 20" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 2L2 17h16L10 2z" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="rgba(255,255,255,0.15)"/>
    <line x1="10" y1="8" x2="10" y2="12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="10" cy="14.5" r=".9" fill="white"/>
  </svg>
</button>

<!-- ── Street name pill (shows current road name during nav) ── -->
<div id="street-pill" class="hidden"></div>

<!-- ── Re-center button (appears when user pans during nav) ── -->
<button id="recenter-btn" class="hidden" title="Re-center">⊙</button>

<!-- ── Toast ──────────────────────────────────── -->
<div id="toast" class="hidden"></div>

<!-- ── PWA install toast ───────────────────────── -->
<div id="install-toast" class="hidden">
  <span>Add Radar to your home screen</span>
  <button id="install-toast-btn">Install</button>
  <button id="install-toast-close">✕</button>
</div>

<!-- ── Waze-style report bottom sheet ──────────── -->
<div id="report-sheet" class="hidden">
  <!-- Step 1: category picker -->
  <div id="rpt-step1">
    <div class="rpt-header">
      <span class="rpt-title">What do you see?</span>
      <button class="rpt-close" id="rpt-close1">✕</button>
    </div>
    <div id="rpt-categories">
      <button class="rpt-cat" data-cat="police">
        <div class="rpt-icon" style="background:#1a2540">🚔</div>
        <span>Police</span>
      </button>
      <button class="rpt-cat" data-cat="speed_trap">
        <div class="rpt-icon" style="background:#1e1a2e">📷</div>
        <span>Speed trap</span>
      </button>
      <button class="rpt-cat" data-cat="accident">
        <div class="rpt-icon" style="background:#2a1414">💥</div>
        <span>Crash</span>
      </button>
      <button class="rpt-cat" data-cat="hazard">
        <div class="rpt-icon" style="background:#241c0a">⚠️</div>
        <span>Hazard</span>
      </button>
    </div>
  </div>
  <!-- Step 2: sub-type picker -->
  <div id="rpt-step2" class="hidden">
    <div class="rpt-header">
      <span class="rpt-title" id="rpt-step2-title">Report</span>
      <button class="rpt-close" id="rpt-back">✕</button>
    </div>
    <div id="rpt-subtypes"></div>
    <div id="rpt-actions">
      <button id="rpt-cancel">Cancel</button>
      <button id="rpt-submit">Report</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="/app.js"></script>
</body>
</html>
