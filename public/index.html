<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radar</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="map"></div>

<!-- ── Normal top bar ──────────────────────────── -->
<div id="topbar">
  <div id="logo">📡 RADAR</div>
  <div id="filters">
    <button class="filter-btn active" data-layer="police" title="Police">🚔</button>
    <button class="filter-btn active" data-layer="speed"  title="Speed cams">📷</button>
    <button class="filter-btn active" data-layer="red_light" title="Red light">🔴</button>
  </div>
  <button id="search-toggle" title="Navigate">🔍</button>
  <button id="style-toggle" title="Map style">🗺</button>
</div>

<!-- ── Route planner (from / to) ───────────────── -->
<div id="route-planner" class="hidden">
  <div id="planner-top">
    <button id="planner-back">←</button>
    <div id="planner-fields">
      <div class="field-row" id="from-row">
        <div class="field-dot dot-from"></div>
        <input id="from-input" class="field-input" type="text"
               placeholder="Your location" autocomplete="off" spellcheck="false">
        <button class="field-clear hidden" id="from-clear">✕</button>
      </div>
      <div class="field-connector">
        <div class="connector-line"></div>
        <button id="swap-btn" title="Swap">⇅</button>
      </div>
      <div class="field-row" id="to-row">
        <div class="field-dot dot-to"></div>
        <input id="to-input" class="field-input" type="text"
               placeholder="Where to?" autocomplete="off" spellcheck="false">
        <button class="field-clear hidden" id="to-clear">✕</button>
      </div>
    </div>
  </div>
  <div id="search-results"></div>
</div>

<!-- ── Route preview ───────────────────────────── -->
<div id="preview-bar" class="hidden">
  <div id="preview-head">
    <div id="preview-meta">
      <div id="preview-dist">–</div>
      <div id="preview-time">–</div>
      <div id="preview-eta">–</div>
    </div>
    <button id="start-nav-btn">▶ Go</button>
    <button id="cancel-route-btn">✕</button>
  </div>
  <div id="directions-list"></div>
</div>

<!-- ── Active navigation: instruction ──────────── -->
<div id="nav-instruction" class="hidden">
  <div id="nav-icon">↑</div>
  <div id="nav-text">
    <div id="nav-dist">–</div>
    <div id="nav-street">–</div>
  </div>
</div>

<!-- ── Active navigation: footer ───────────────── -->
<div id="nav-footer" class="hidden">
  <div id="nav-eta-block">
    <div id="nav-eta">–</div>
    <div id="nav-remaining">–</div>
  </div>
  <div id="speed-block">
    <div id="speed-limit-sign" class="hidden"><span id="speed-limit-val">–</span></div>
    <div id="current-speed">– <small>km/h</small></div>
  </div>
  <button id="end-nav-btn">✕ End</button>
</div>

<!-- ── Map style panel ─────────────────────────── -->
<div id="style-panel" class="hidden">
  <div id="style-panel-bg"></div>
  <div id="style-sheet">
    <div id="style-header">
      <span>Map style</span>
      <button id="style-close">✕</button>
    </div>
    <div id="style-grid">
      <button class="style-btn active" data-style="dark">
        <div class="style-thumb" style="background:#1a1a2e"></div>
        <span>Dark</span>
      </button>
      <button class="style-btn" data-style="light">
        <div class="style-thumb" style="background:#f5f3ee"></div>
        <span>Light</span>
      </button>
      <button class="style-btn" data-style="voyager">
        <div class="style-thumb" style="background:#d4e4c8;border:2px solid #bbb"></div>
        <span>Street</span>
      </button>
      <button class="style-btn" data-style="satellite">
        <div class="style-thumb" style="background:#2d4a2d"></div>
        <span>Satellite</span>
      </button>
      <button class="style-btn" data-style="terrain">
        <div class="style-thumb" style="background:#c5d8a4;border:2px solid #bbb"></div>
        <span>Terrain</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Report FAB ──────────────────────────────── -->
<button id="report-btn" title="Report sighting">🚨</button>

<!-- ── Report modal ────────────────────────────── -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h2>Report a sighting</h2>
    <p id="modal-coords"></p>
    <div class="type-grid">
      <button class="type-btn active" data-type="police">🚔 Police</button>
      <button class="type-btn" data-type="speed_trap">📸 Speed trap</button>
      <button class="type-btn" data-type="accident">⚠️ Accident</button>
      <button class="type-btn" data-type="hazard">🚧 Hazard</button>
    </div>
    <textarea id="desc-input" placeholder="Optional note…" rows="2" maxlength="120"></textarea>
    <div class="modal-actions">
      <button id="cancel-btn">Cancel</button>
      <button id="submit-btn">Submit</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="/app.js"></script>
</body>
</html>
