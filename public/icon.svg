<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <polygon id="s" points="0,-36 8.6,-12 34.2,-11.1 13.9,4.5 21.1,29.2 0,15 -21.1,29.2 -13.9,4.5 -34.2,-11.1 -8.6,-12"/>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="88" fill="url(#vignette)"/>

  <!-- 5 Wanted Stars -->
  <g fill="#ffd700" filter="url(#starGlow)">
    <use href="#s" transform="translate(56,180)"/>
    <use href="#s" transform="translate(156,180)"/>
    <use href="#s" transform="translate(256,180)"/>
    <use href="#s" transform="translate(356,180)"/>
    <use href="#s" transform="translate(456,180)"/>
  </g>

  <!-- GTA-style GHOST text -->
  <text x="256" y="382"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-style="italic"
        font-size="118"
        fill="white"
        stroke="#000"
        stroke-width="12"
        stroke-linejoin="round"
        paint-order="stroke fill"
        text-anchor="middle"
        letter-spacing="4">GHOST</text>
</svg>
