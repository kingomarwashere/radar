<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <polygon id="s" points="0,-36 8.6,-12 34.2,-11.1 13.9,4.5 21.1,29.2 0,15 -21.1,29.2 -13.9,4.5 -34.2,-11.1 -8.6,-12"/>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Gold gradient: bright top, richer bottom — Pricedown sheen -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff7a0"/>
      <stop offset="30%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c8890a"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="88" fill="url(#vignette)"/>

  <!-- 5 Wanted Stars -->
  <g fill="#ffd700" filter="url(#starGlow)">
    <use href="#s" transform="translate(56,172)"/>
    <use href="#s" transform="translate(156,172)"/>
    <use href="#s" transform="translate(256,172)"/>
    <use href="#s" transform="translate(356,172)"/>
    <use href="#s" transform="translate(456,172)"/>
  </g>

  <!-- 3-D shadow layer (dark brown, offset down-right) -->
  <text x="262" y="392"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="112"
        fill="#5a3500"
        text-anchor="middle"
        textLength="448"
        lengthAdjust="spacingAndGlyphs">GHOST</text>

  <!-- Outer black stroke -->
  <text x="256" y="386"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="112"
        fill="none"
        stroke="#000"
        stroke-width="16"
        stroke-linejoin="round"
        text-anchor="middle"
        textLength="448"
        lengthAdjust="spacingAndGlyphs">GHOST</text>

  <!-- Main gold fill with glow -->
  <text x="256" y="386"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="112"
        fill="url(#goldGrad)"
        text-anchor="middle"
        textLength="448"
        lengthAdjust="spacingAndGlyphs"
        filter="url(#textGlow)">GHOST</text>
</svg>
