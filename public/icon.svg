<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Small star for top row: outer R=32, inner r=13 -->
    <polygon id="s" points="0,-32 7.6,-10.5 30.4,-9.9 12.4,4.0 18.8,25.9 0,13 -18.8,25.9 -12.4,4.0 -30.4,-9.9 -7.6,-10.5"/>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lightBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#160000" stop-opacity="0.75"/>
    </radialGradient>
    <!-- Windshield gradient -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ecfef" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6aaad4" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#090909"/>
  <rect width="512" height="512" rx="88" fill="url(#vignette)"/>

  <!-- ── 5 Wanted Stars ────────────────────────────── -->
  <g fill="#ffd700" filter="url(#starGlow)">
    <use href="#s" transform="translate(56,92)"/>
    <use href="#s" transform="translate(156,92)"/>
    <use href="#s" transform="translate(256,92)"/>
    <use href="#s" transform="translate(356,92)"/>
    <use href="#s" transform="translate(456,92)"/>
  </g>

  <!-- ── Police Car (side view, pointing right) ───── -->

  <!-- Ground shadow -->
  <ellipse cx="256" cy="484" rx="196" ry="10" fill="#000" opacity="0.45"/>

  <!-- Wheels (behind body) -->
  <!-- Rear wheel -->
  <circle cx="148" cy="432" r="46" fill="#141414"/>
  <circle cx="148" cy="432" r="27" fill="#2a2a2a"/>
  <circle cx="148" cy="432" r="11" fill="#777"/>
  <!-- Front wheel -->
  <circle cx="370" cy="432" r="46" fill="#141414"/>
  <circle cx="370" cy="432" r="27" fill="#2a2a2a"/>
  <circle cx="370" cy="432" r="11" fill="#777"/>

  <!-- Car body — white with blue NSW-style stripe -->
  <rect x="38" y="308" width="436" height="114" rx="22" fill="#e9e9e9"/>
  <!-- Blue stripe across middle of body -->
  <rect x="38" y="340" width="436" height="40" fill="#1c3784"/>
  <!-- Wheel arch cut-outs (white fenders) -->
  <circle cx="148" cy="422" r="52" fill="#e9e9e9"/>
  <circle cx="370" cy="422" r="52" fill="#e9e9e9"/>

  <!-- Headlight (front, right side) -->
  <rect x="458" y="328" width="16" height="30" rx="5" fill="#fffbe0"/>
  <rect x="458" y="328" width="16" height="30" rx="5" fill="#ffee88" opacity="0.6" filter="url(#lightBloom)"/>
  <!-- Front bumper -->
  <rect x="454" y="370" width="22" height="16" rx="4" fill="#bbb"/>
  <!-- Grille -->
  <rect x="456" y="352" width="18" height="18" rx="3" fill="#888"/>

  <!-- Taillight (rear, left side) -->
  <rect x="38" y="328" width="12" height="28" rx="4" fill="#cc2200"/>
  <rect x="38" y="328" width="12" height="28" rx="4" fill="#ff3311" opacity="0.5" filter="url(#lightBloom)"/>

  <!-- Cabin (blue roof) -->
  <rect x="128" y="240" width="256" height="74" rx="14" fill="#1c3784"/>

  <!-- Windows -->
  <rect x="138" y="248" width="236" height="60" rx="9" fill="url(#glass)"/>
  <!-- A-pillar (front) -->
  <rect x="320" y="248" width="8" height="60" fill="#1c3784"/>
  <!-- B-pillar (rear) -->
  <rect x="192" y="248" width="7" height="60" fill="#1c3784"/>

  <!-- Light bar housing -->
  <rect x="144" y="226" width="224" height="20" rx="7" fill="#111"/>

  <!-- Bloom glow behind lights -->
  <rect x="150" y="229" width="48" height="11" rx="3" fill="#ff2020" opacity="0.7" filter="url(#lightBloom)"/>
  <rect x="208" y="229" width="48" height="11" rx="3" fill="#2255ff" opacity="0.7" filter="url(#lightBloom)"/>
  <rect x="256" y="229" width="48" height="11" rx="3" fill="#ff2020" opacity="0.7" filter="url(#lightBloom)"/>
  <rect x="314" y="229" width="48" height="11" rx="3" fill="#2255ff" opacity="0.7" filter="url(#lightBloom)"/>

  <!-- Actual lights (crisp on top) -->
  <rect x="150" y="229" width="48" height="11" rx="3" fill="#ff3030"/>
  <rect x="208" y="229" width="48" height="11" rx="3" fill="#3b6eff"/>
  <rect x="256" y="229" width="48" height="11" rx="3" fill="#ff3030"/>
  <rect x="314" y="229" width="48" height="11" rx="3" fill="#3b6eff"/>

  <!-- POLICE text on blue stripe -->
  <text x="256" y="367" font-family="Arial Black,sans-serif" font-weight="900"
        font-size="28" fill="white" text-anchor="middle" letter-spacing="6" opacity="0.9">POLICE</text>
</svg>
